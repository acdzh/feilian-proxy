name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package Magisk module
        run: |
          cd module
          zip -r ../feilian-proxy-${{ github.ref_name }}.zip . -x '*.DS_Store'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: feilian-proxy-${{ github.ref_name }}.zip
